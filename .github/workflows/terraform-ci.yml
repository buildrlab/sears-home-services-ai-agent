name: Terraform CI

on:
  pull_request:
    branches: ["dev", "main"]
    paths:
      - "infra/**"
      - "backend/infra/**"
      - "frontend/infra/**"
      - ".github/workflows/terraform-ci.yml"
  push:
    branches: ["dev", "main"]
    paths:
      - "infra/**"
      - "backend/infra/**"
      - "frontend/infra/**"
      - ".github/workflows/terraform-ci.yml"

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        directory:
          - infra/bootstrap
          - infra/shared
          - backend/infra
          - frontend/infra
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt
        run: terraform fmt -check -recursive
      - name: Terraform init
        run: terraform init -backend=false
      - name: Terraform validate
        run: terraform validate

  terraform-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Trivy Terraform/config scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            aquasec/trivy:0.72.0 config \
            --skip-dirs /repo/backend/.venv \
            --skip-dirs /repo/frontend/node_modules \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            /repo
