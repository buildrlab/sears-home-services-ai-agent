name: Terraform CI

on:
  pull_request:
    branches: ["dev", "main"]
    paths:
      - "infra/**"
      - "backend/infra/**"
      - "frontend/infra/**"
      - ".github/workflows/terraform-ci.yml"
  push:
    branches: ["dev", "main"]
    paths:
      - "infra/**"
      - "backend/infra/**"
      - "frontend/infra/**"
      - ".github/workflows/terraform-ci.yml"

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        directory:
          - infra/shared
          - backend/infra
          - frontend/infra
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt
        run: terraform fmt -check -recursive
      - name: Terraform init
        run: terraform init -backend=false
      - name: Terraform validate
        run: terraform validate

