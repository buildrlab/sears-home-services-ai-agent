name: Backend CI

on:
  pull_request:
    branches: ["dev", "main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: ["dev", "main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.14"
      - name: Install backend tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Pytest
        run: python -W error -m pytest
      - name: Dependency audit
        run: pip-audit
      - name: Docker build
        run: docker build -t shs-ai-agent-backend:ci .
