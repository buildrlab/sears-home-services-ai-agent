name: Scripts CI

on:
  pull_request:
    branches: ["dev", "main"]
    paths:
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/scripts-ci.yml"
  push:
    branches: ["dev", "main"]
    paths:
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/scripts-ci.yml"

permissions:
  contents: read

jobs:
  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.14"
      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff==0.15.20
      - name: Ruff lint
        run: ruff check scripts tests
      - name: Compile scripts
        run: python -m compileall scripts tests
      - name: Unit tests
        run: python -m unittest discover -s tests
