name: AWS Destroy

run-name: AWS Destroy ${{ github.event.inputs.environment || 'prod' }} ${{ github.event.inputs.mode || 'plan' }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
      mode:
        description: "Plan or destroy"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - destroy
      scope:
        description: "Destroy application stacks only, or include shared VPC/IAM/ECS resources"
        required: true
        default: "app-only"
        type: choice
        options:
          - app-only
          - all-including-shared
      delete_data:
        description: "Required for destroy mode. Allows deleting S3 objects, ECR images, and database resources."
        required: true
        default: false
        type: boolean
      skip_final_snapshot:
        description: "Skip the Aurora final snapshot. Keep false unless the database is already backed up or disposable."
        required: true
        default: false
        type: boolean
      confirmation:
        description: "For destroy mode, type: destroy sears-home-services-ai-agent prod"
        required: true
        default: "plan only"
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-environment-${{ github.event.inputs.environment || 'prod' }}
  cancel-in-progress: false

env:
  PROJECT_NAME: sears-home-services-ai-agent
  DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment || 'prod' }}
  DESTROY_MODE: ${{ github.event.inputs.mode || 'plan' }}
  DESTROY_SCOPE: ${{ github.event.inputs.scope || 'app-only' }}
  DELETE_DATA: ${{ github.event.inputs.delete_data || 'false' }}
  SKIP_FINAL_SNAPSHOT: ${{ github.event.inputs.skip_final_snapshot || 'false' }}
  DESTROY_CONFIRMATION: ${{ github.event.inputs.confirmation || '' }}
  AWS_REGION: us-east-1
  API_DOMAIN_NAME: api.shs.buildrlab.com
  WS_DOMAIN_NAME: ws.shs.buildrlab.com
  FRONTEND_DOMAIN_NAME: shs.buildrlab.com
  EMAIL_DOMAIN: shs.buildrlab.com
  TF_INPUT: "false"
  TF_IN_AUTOMATION: "true"

jobs:
  destroy:
    name: Destroy ${{ github.event.inputs.environment || 'prod' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'prod' }}
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: aws-actions/configure-aws-credentials@v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_DEVOPS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          allowed-account-ids: ${{ vars.AWS_DEVOPS_ACCOUNT_ID }}

      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_wrapper: false

      - name: Verify required destroy configuration
        env:
          AWS_DEVOPS_ROLE_ARN: ${{ secrets.AWS_DEVOPS_ROLE_ARN }}
          AWS_DEVOPS_ACCOUNT_ID: ${{ vars.AWS_DEVOPS_ACCOUNT_ID }}
          SHS_WORKLOAD_ACCOUNT_ID: ${{ vars.SHS_WORKLOAD_ACCOUNT_ID }}
          SHS_DNS_ACCOUNT_ID: ${{ vars.SHS_DNS_ACCOUNT_ID }}
          SHS_HOSTED_ZONE_ID: ${{ vars.SHS_HOSTED_ZONE_ID }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
        run: |
          missing=0
          for name in AWS_DEVOPS_ROLE_ARN AWS_DEVOPS_ACCOUNT_ID SHS_WORKLOAD_ACCOUNT_ID SHS_DNS_ACCOUNT_ID SHS_HOSTED_ZONE_ID TF_STATE_BUCKET; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for AWS destroy runs"
              missing=1
            fi
          done

          expected_confirmation="destroy ${PROJECT_NAME} ${DEPLOY_ENVIRONMENT}"
          if [ "$DESTROY_MODE" = "destroy" ]; then
            if [ "$DESTROY_CONFIRMATION" != "$expected_confirmation" ]; then
              echo "::error::Destroy mode requires confirmation text: ${expected_confirmation}"
              missing=1
            fi
            if [ "$DELETE_DATA" != "true" ]; then
              echo "::error::Destroy mode requires delete_data=true because S3, ECR, and database resources contain project data."
              missing=1
            fi
          fi

          if [ "$DESTROY_SCOPE" = "all-including-shared" ]; then
            echo "::warning::This run will also destroy shared VPC, ECS cluster, and deployment IAM resources after app stacks are removed."
          fi
          echo "::notice::The shared Terraform state bucket is not destroyed by this workflow."
          exit "$missing"

      - name: Write Terraform backend configs
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
        run: |
          for stack in infra/shared backend/infra frontend/infra; do
            cat > "${stack}/backend.hcl" <<EOF
          bucket       = "${TF_STATE_BUCKET}"
          region       = "${AWS_REGION}"
          key          = "${PROJECT_NAME}/${DEPLOY_ENVIRONMENT}/${stack}.tfstate"
          use_lockfile = true
          EOF
          done

      - name: Write shared Terraform variables
        env:
          SHS_WORKLOAD_ACCOUNT_ID: ${{ vars.SHS_WORKLOAD_ACCOUNT_ID }}
        run: |
          jq -n \
            --arg project_name "$PROJECT_NAME" \
            --arg environment "$DEPLOY_ENVIRONMENT" \
            --arg aws_region "$AWS_REGION" \
            --arg workload_account_id "$SHS_WORKLOAD_ACCOUNT_ID" \
            '{
              project_name: $project_name,
              environment: $environment,
              aws_region: $aws_region,
              workload_account_id: $workload_account_id,
              ci_cd_mode: true,
              workload_sso_profile: "",
              tags: {
                Project: "SearsHomeServicesAiAgent",
                Environment: $environment
              }
            }' > "infra/shared/${DEPLOY_ENVIRONMENT}.auto.tfvars.json"

      - name: Terraform shared init
        run: terraform -chdir=infra/shared init -backend-config=backend.hcl

      - name: Capture shared outputs
        id: shared
        run: |
          set -euo pipefail
          shared_outputs="$(terraform -chdir=infra/shared output -json)"
          if ! jq -e '
            has("vpc_id") and
            has("ecs_cluster_name") and
            has("ecs_cluster_arn") and
            has("public_subnet_ids") and
            has("private_subnet_ids")
          ' <<< "$shared_outputs" >/dev/null; then
            echo "::error::Shared Terraform outputs are required before application stacks can be destroyed."
            echo "$shared_outputs"
            exit 1
          fi
          {
            echo "vpc_id=$(jq -r '.vpc_id.value' <<< "$shared_outputs")"
            echo "ecs_cluster_name=$(jq -r '.ecs_cluster_name.value' <<< "$shared_outputs")"
            echo "ecs_cluster_arn=$(jq -r '.ecs_cluster_arn.value' <<< "$shared_outputs")"
            echo "public_subnet_ids=$(jq -c '.public_subnet_ids.value' <<< "$shared_outputs")"
            echo "private_subnet_ids=$(jq -c '.private_subnet_ids.value' <<< "$shared_outputs")"
          } >> "$GITHUB_OUTPUT"

      - name: Write backend Terraform variables
        env:
          SHS_WORKLOAD_ACCOUNT_ID: ${{ vars.SHS_WORKLOAD_ACCOUNT_ID }}
          SHS_DNS_ACCOUNT_ID: ${{ vars.SHS_DNS_ACCOUNT_ID }}
          SHS_HOSTED_ZONE_ID: ${{ vars.SHS_HOSTED_ZONE_ID }}
          SHARED_VPC_ID: ${{ steps.shared.outputs.vpc_id }}
          PUBLIC_SUBNET_IDS: ${{ steps.shared.outputs.public_subnet_ids }}
          PRIVATE_SUBNET_IDS: ${{ steps.shared.outputs.private_subnet_ids }}
          ECS_CLUSTER_ARN: ${{ steps.shared.outputs.ecs_cluster_arn }}
          ECS_CLUSTER_NAME: ${{ steps.shared.outputs.ecs_cluster_name }}
        run: |
          jq -n \
            --arg project_name "$PROJECT_NAME" \
            --arg environment "$DEPLOY_ENVIRONMENT" \
            --arg aws_region "$AWS_REGION" \
            --arg workload_account_id "$SHS_WORKLOAD_ACCOUNT_ID" \
            --arg dns_account_id "$SHS_DNS_ACCOUNT_ID" \
            --arg hosted_zone_id "$SHS_HOSTED_ZONE_ID" \
            --arg vpc_id "$SHARED_VPC_ID" \
            --arg ecs_cluster_arn "$ECS_CLUSTER_ARN" \
            --arg ecs_cluster_name "$ECS_CLUSTER_NAME" \
            --arg api_domain_name "$API_DOMAIN_NAME" \
            --arg ws_domain_name "$WS_DOMAIN_NAME" \
            --arg frontend_domain_name "$FRONTEND_DOMAIN_NAME" \
            --arg backend_image_tag "$GITHUB_SHA" \
            --arg email_domain "$EMAIL_DOMAIN" \
            --arg email_from_address "Sears Home Services <no-reply@${EMAIL_DOMAIN}>" \
            --argjson public_subnet_ids "$PUBLIC_SUBNET_IDS" \
            --argjson private_subnet_ids "$PRIVATE_SUBNET_IDS" \
            --argjson delete_data "$DELETE_DATA" \
            --argjson skip_final_snapshot "$SKIP_FINAL_SNAPSHOT" \
            '{
              project_name: $project_name,
              environment: $environment,
              aws_region: $aws_region,
              workload_account_id: $workload_account_id,
              dns_account_id: $dns_account_id,
              hosted_zone_id: $hosted_zone_id,
              ci_cd_mode: true,
              workload_sso_profile: "",
              dns_sso_profile: "",
              vpc_id: $vpc_id,
              public_subnet_ids: $public_subnet_ids,
              private_subnet_ids: $private_subnet_ids,
              ecs_cluster_arn: $ecs_cluster_arn,
              ecs_cluster_name: $ecs_cluster_name,
              api_domain_name: $api_domain_name,
              ws_domain_name: $ws_domain_name,
              frontend_domain_name: $frontend_domain_name,
              backend_image_tag: $backend_image_tag,
              api_desired_count: 0,
              worker_desired_count: 0,
              allowed_cors_origins: ["https://" + $frontend_domain_name],
              email_domain: $email_domain,
              email_from_address: $email_from_address,
              enable_alb_deletion_protection: false,
              database_deletion_protection: false,
              database_skip_final_snapshot: $skip_final_snapshot,
              upload_bucket_force_destroy: $delete_data,
              ecr_force_delete: $delete_data,
              tags: {
                Project: "SearsHomeServicesAiAgent",
                Environment: $environment
              }
            }' > "backend/infra/${DEPLOY_ENVIRONMENT}.auto.tfvars.json"

      - name: Write frontend Terraform variables
        env:
          SHS_WORKLOAD_ACCOUNT_ID: ${{ vars.SHS_WORKLOAD_ACCOUNT_ID }}
          SHS_DNS_ACCOUNT_ID: ${{ vars.SHS_DNS_ACCOUNT_ID }}
          SHS_HOSTED_ZONE_ID: ${{ vars.SHS_HOSTED_ZONE_ID }}
        run: |
          jq -n \
            --arg project_name "$PROJECT_NAME" \
            --arg environment "$DEPLOY_ENVIRONMENT" \
            --arg aws_region "$AWS_REGION" \
            --arg workload_account_id "$SHS_WORKLOAD_ACCOUNT_ID" \
            --arg dns_account_id "$SHS_DNS_ACCOUNT_ID" \
            --arg hosted_zone_id "$SHS_HOSTED_ZONE_ID" \
            --arg frontend_domain_name "$FRONTEND_DOMAIN_NAME" \
            --argjson delete_data "$DELETE_DATA" \
            '{
              project_name: $project_name,
              environment: $environment,
              aws_region: $aws_region,
              workload_account_id: $workload_account_id,
              dns_account_id: $dns_account_id,
              hosted_zone_id: $hosted_zone_id,
              ci_cd_mode: true,
              workload_sso_profile: "",
              dns_sso_profile: "",
              frontend_domain_name: $frontend_domain_name,
              frontend_bucket_force_destroy: $delete_data,
              tags: {
                Project: "SearsHomeServicesAiAgent",
                Environment: $environment
              }
            }' > "frontend/infra/${DEPLOY_ENVIRONMENT}.auto.tfvars.json"

      - name: Terraform frontend plan destroy
        run: |
          terraform -chdir=frontend/infra init -backend-config=backend.hcl
          terraform -chdir=frontend/infra plan -destroy -out=tfplan.destroy

      - name: Terraform frontend destroy
        if: ${{ env.DESTROY_MODE == 'destroy' }}
        run: terraform -chdir=frontend/infra destroy -auto-approve

      - name: Terraform backend prepare for destroy
        if: ${{ env.DESTROY_MODE == 'destroy' }}
        run: |
          terraform -chdir=backend/infra init -backend-config=backend.hcl
          terraform -chdir=backend/infra apply -auto-approve

      - name: Terraform backend plan destroy
        run: |
          terraform -chdir=backend/infra init -backend-config=backend.hcl
          terraform -chdir=backend/infra plan -destroy -out=tfplan.destroy

      - name: Terraform backend destroy
        if: ${{ env.DESTROY_MODE == 'destroy' }}
        run: terraform -chdir=backend/infra destroy -auto-approve

      - name: Terraform shared plan destroy
        if: ${{ env.DESTROY_SCOPE == 'all-including-shared' }}
        run: terraform -chdir=infra/shared plan -destroy -out=tfplan.destroy

      - name: Terraform shared destroy
        if: ${{ env.DESTROY_MODE == 'destroy' && env.DESTROY_SCOPE == 'all-including-shared' }}
        run: terraform -chdir=infra/shared destroy -auto-approve

      - name: Destroy summary
        run: |
          if [ "$DESTROY_MODE" = "destroy" ]; then
            echo "Destroy mode completed for scope: ${DESTROY_SCOPE}"
          else
            echo "Plan mode completed. Rerun with mode=destroy, delete_data=true, and exact confirmation text to remove resources."
          fi
          echo "Terraform state bucket ${PROJECT_NAME}/${DEPLOY_ENVIRONMENT} state objects were intentionally retained."
