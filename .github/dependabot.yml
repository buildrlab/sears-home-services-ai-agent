version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Dublin"
    open-pull-requests-limit: 1
    groups:
      backend-python:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/frontend"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:15"
      timezone: "Europe/Dublin"
    open-pull-requests-limit: 1
    groups:
      frontend-npm:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:30"
      timezone: "Europe/Dublin"
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "terraform"
    directory: "/infra/shared"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:45"
      timezone: "Europe/Dublin"
    open-pull-requests-limit: 1
    groups:
      terraform-shared:
        patterns:
          - "*"

  - package-ecosystem: "terraform"
    directory: "/backend/infra"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Dublin"
    open-pull-requests-limit: 1
    groups:
      terraform-backend:
        patterns:
          - "*"

  - package-ecosystem: "terraform"
    directory: "/frontend/infra"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "Europe/Dublin"
    open-pull-requests-limit: 1
    groups:
      terraform-frontend:
        patterns:
          - "*"

