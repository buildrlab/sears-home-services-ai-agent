services:
  backend-migrate:
    build:
      context: ./backend
    environment: &backend-local-env
      ENVIRONMENT: local
      DATABASE_URL: postgresql+psycopg://shs:shs_local_password@postgres:5432/shs_ai_agent
      DATABASE_ECHO: "false"
      OPENAI_API_KEY: ""
      OPENAI_MODEL: gpt-5.5
      OPENAI_REASONING_EFFORT: low
      OPENAI_VERBOSITY: low
      OPENAI_VISION_MODEL: gpt-5.5
      TWILIO_AUTH_TOKEN: ""
      TWILIO_VALIDATE_REQUESTS: "false"
      TWILIO_VOICE_MODE: gather
      TWILIO_CONVERSATION_RELAY_URL: ws://127.0.0.1:8000/twilio/conversation
      PUBLIC_BASE_URL: http://127.0.0.1:8000
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_UPLOAD_BUCKET: shs-ai-agent-uploads-local
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      S3_PRESIGN_EXPIRES_SECONDS: "900"
      UPLOAD_LINK_BASE_URL: http://127.0.0.1:5173/uploads
      UPLOAD_TOKEN_TTL_MINUTES: "60"
      UPLOAD_MAX_BYTES: "10485760"
      UPLOAD_ALLOWED_CONTENT_TYPES: image/jpeg,image/png,image/webp
      EMAIL_DELIVERY_MODE: smtp
      EMAIL_FROM_ADDRESS: "Sears Home Services <no-reply@shs.buildrlab.com>"
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SQS_VISION_QUEUE_URL: ""
      VISION_PRESIGNED_GET_EXPIRES_SECONDS: "600"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini:ro
      - ./backend/app:/app/app
    command: sh -c "alembic upgrade head && python -m app.seed"

  backend:
    build:
      context: ./backend
    environment: *backend-local-env
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini:ro
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:26.4.0-bookworm-slim
    working_dir: /app
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    command: >
      sh -c "npm install -g pnpm@11.9.0 &&
      pnpm install --frozen-lockfile &&
      pnpm dev --host 0.0.0.0"

volumes:
  frontend-node-modules:
